[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node web/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
  [environments.production.variables]
    PORT = "8080"
    NODE_ENV = "production"
